<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunet Hub — Timothy AI</title>
    <link rel="icon" type="image/png" href="../e.ico">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #a855f7;
            --secondary: #7c3aed;
            --bg-dark: #09060d;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-border: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius-lg: 24px;
            --radius-md: 14px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                    radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 40%),
                    radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* --- Navigation (Matches Cinema/Arcade) --- */
        nav {
            width: 100%; height: 70px;
            background: rgba(9, 6, 13, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--surface-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; position: fixed; top: 0; z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
        .logo-area img { border-radius: 8px; }

        .nav-links { list-style: none; display: flex; gap: 5px; }
        .nav-links a {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 15px; color: var(--text-muted);
            text-decoration: none; border-radius: var(--radius-md);
            font-size: 0.85rem; font-weight: 500; transition: var(--transition);
        }
        .nav-links a:hover, .nav-links a.active { background: var(--surface); color: #fff; }

        /* --- Main Layout --- */
        main {
            flex: 1;
            margin-top: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        .header-box {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-box h2 { font-size: 1.5rem; font-weight: 700; color: #fff; }

        #live-clock {
            background: var(--surface);
            padding: 8px 18px;
            border-radius: 100px;
            font-family: monospace;
            border: 1px solid var(--surface-border);
            color: var(--primary);
            font-size: 0.9rem;
        }

        /* --- Chat Interface --- */
        .chat-wrapper {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
        }
        #chat-messages::-webkit-scrollbar { display: none; }

        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 25px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--surface-border);
            display: flex;
            gap: 15px;
        }

        #userInput {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--surface-border);
            padding: 16px 25px;
            border-radius: 100px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        #userInput:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(-10deg);
            background: var(--secondary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .nav-links span { display: none; }
            main { padding: 20px 10px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <img src="../e.ico" alt="Lunet" width="32" height="32">
        <h1>LUNET</h1>
    </div>

    <ul class="nav-links">
        <li><a href="index.html"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
        <li><a href="games.html"><i class="fa-solid fa-gamepad"></i> <span>Arcade</span></a></li>
        <li><a href="#" class="active"><i class="fa-solid fa-code"></i> <span>Timothy AI</span></a></li>
        <li><a href="enter/enter.html"><i class="fa-solid fa-tv"></i> <span>Streaming</span></a></li>
        <li><a href="tools.html"><i class="fa-solid fa-toolbox"></i> <span>Utility</span></a></li>
        <li><a href="other.html"><i class="fa-solid fa-bell"></i> <span>OS</span></a></li>
        <li><a href="about.html"><i class="fa-solid fa-circle"></i> <span>About</span></a></li>
    </ul>
</nav>

<main>
    <div class="header-box">
        <h2>Timothy AI</h2>
        <div id="live-clock">00:00:00</div>
    </div>

    <div class="chat-wrapper">
        <div id="chat-messages">
            <div class="message ai-msg">Wassup. I'm Timothy AI, your Lunet Bridge assistant. I recommend you wait 10+ seconds before sending messages back to back.</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Timothy anything..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</main>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('userInput');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';

        const loadingId = 'ai-' + Date.now();
        appendMessage('ai', 'Thinking...', loadingId);

        try {
            const response = await fetch('https://little-poetry-0a0c.nickygomez-29.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            const aiBubble = document.getElementById(loadingId);

            if (data && data.answer) {
                aiBubble.textContent = data.answer;
            } else {
                aiBubble.textContent = "Error: The bridge responded with an empty object.";
            }

        } catch (error) {
            document.getElementById(loadingId).textContent = "Network Error: Could not reach the Cloudflare Worker.";
        }

        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function appendMessage(role, text, id = null) {
        const msg = document.createElement('div');
        msg.className = `message ${role}-msg`;
        if (id) msg.id = id;
        msg.textContent = text;
        chatMessages.appendChild(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
